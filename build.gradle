plugins {
	id 'fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	// Ambient/AmbleLabs don't publish AIT to a maven repo that's needed at compile time here.
	// AIT and its dependencies are instead pulled in as local jars below, which also puts
	// them on the compile classpath for the mixins that reference AIT's classes directly
	// (see dev.aitmore.mixin.AnimatedTravelHandlerMixin). So no extra repos needed.
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// Local copies of AIT and AIT-Extras so they're present in the dev/test run.
	// modImplementation makes Loom remap them to match your dev mappings and puts
	// them on the runtime classpath, so Fabric Loader picks them up like real mods.
	modImplementation fileTree(dir: 'libs', include: '*.jar')
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.archivesBaseName}" }
	}
}
